<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Catalogue — Cinnamon Forest</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

    :root {
      --ink: #1c140f;
      --paper: #f6efe2;
      --paper-dark: #ede4d0;
      --leather: #2b1d14;
      --leather-2: #3c281a;
      --leather-3: #4f3522;
      --brass: #c89b4a;
      --brass-light: #e6c878;
      --brass-dim: rgba(200, 155, 74, .4);
      --shadow: rgba(0, 0, 0, .55);
      --sidebar-w: 200px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: radial-gradient(ellipse at 50% -10%, #5a3c24 0%, var(--leather) 50%, #100a06 100%);
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      color: var(--brass-light);
    }

    /* ===== Layout ===== */
    .app {
      display: flex;
      height: 100%;
      width: 100%;
      position: relative;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: rgba(0, 0, 0, .35);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(200, 155, 74, .12);
      display: flex;
      flex-direction: column;
      transition: transform .3s ease, width .3s ease;
      z-index: 20;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 14px 12px;
      border-bottom: 1px solid rgba(200, 155, 74, .1);
      flex-shrink: 0;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-style: italic;
      color: var(--brass-light);
      letter-spacing: .04em;
      line-height: 1.4;
    }

    .brand small {
      display: block;
      font-family: 'Inter', sans-serif;
      font-style: normal;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--brass);
      margin-top: 3px;
    }

    .thumb-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(200, 155, 74, .25) transparent;
    }

    .thumb-list::-webkit-scrollbar {
      width: 4px;
    }

    .thumb-list::-webkit-scrollbar-thumb {
      background: rgba(200, 155, 74, .25);
      border-radius: 2px;
    }

    .thumb-item {
      position: relative;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
      border: 1.5px solid transparent;
      transition: border-color .2s, transform .15s;
      background: var(--paper-dark);
      aspect-ratio: 210/297;
    }

    .thumb-item:hover {
      border-color: var(--brass-dim);
      transform: scale(1.02);
    }

    .thumb-item.active {
      border-color: var(--brass);
    }

    .thumb-item canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .thumb-num {
      position: absolute;
      bottom: 4px;
      right: 5px;
      font-size: 9px;
      background: rgba(0, 0, 0, .6);
      color: #cdb98a;
      padding: 1px 4px;
      border-radius: 2px;
      letter-spacing: .03em;
    }

    .thumb-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper-dark);
    }

    .mini-ring {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid rgba(200, 155, 74, .2);
      border-top-color: var(--brass);
      animation: spin 1s linear infinite;
    }

    /* ===== Main area ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 16px 12px;
      position: relative;
      min-width: 0;
    }

    /* ===== Top bar ===== */
    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 30;
    }

    .toggle-sidebar {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: rgba(0, 0, 0, .25);
      border: 1px solid var(--brass-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0;
    }

    .toggle-sidebar:hover {
      background: rgba(200, 155, 74, .18);
    }

    .toggle-sidebar svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: var(--brass-light);
      stroke-width: 1.8;
      stroke-linecap: round;
    }

    .title-center {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--brass-light);
      opacity: .85;
      text-align: center;
    }

    .top-actions {
      display: flex;
      gap: 8px;
    }

    .pill {
      border: 1px solid var(--brass-dim);
      background: rgba(0, 0, 0, .25);
      color: var(--brass-light);
      font-size: 11px;
      letter-spacing: .05em;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background .15s, transform .15s;
      white-space: nowrap;
    }

    .pill:hover {
      background: rgba(200, 155, 74, .18);
      transform: translateY(-1px);
    }

    /* ===== Progress bar ===== */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(200, 155, 74, .1);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brass), var(--brass-light));
      transition: width .4s ease;
      border-radius: 0 2px 2px 0;
    }

    /* ===== Book ===== */
    .book-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding-top: 50px;
      padding-bottom: 64px;
    }

    .book-wrap {
      position: relative;
      perspective: 2800px;
      width: min(90vw, 860px);
      height: min(68vh, 620px);
    }

    .book {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .book-shadow {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -22px;
      height: 30px;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, .5) 0%, transparent 75%);
      filter: blur(3px);
    }

    .spread {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      background: var(--leather-2);
      border-radius: 4px;
      box-shadow:
        0 40px 80px -16px rgba(0, 0, 0, .7),
        0 0 0 1px rgba(0, 0, 0, .45) inset,
        0 1px 0 rgba(200, 155, 74, .08) inset;
      overflow: hidden;
    }

    /* Leather texture overlay */
    .spread::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(135deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, .03) 2px,
          rgba(0, 0, 0, .03) 4px);
      pointer-events: none;
      z-index: 1;
    }

    .spine {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 20px;
      margin-left: -10px;
      background: linear-gradient(90deg,
          rgba(0, 0, 0, .4),
          rgba(0, 0, 0, .05) 35%,
          rgba(200, 155, 74, .03) 50%,
          rgba(0, 0, 0, .05) 65%,
          rgba(0, 0, 0, .4));
      z-index: 5;
      pointer-events: none;
    }

    .page-slot {
      position: relative;
      width: 50%;
      height: 100%;
      background: var(--paper);
      overflow: hidden;
    }

    .page-slot.left {
      border-radius: 4px 0 0 4px;
    }

    .page-slot.right {
      border-radius: 0 4px 4px 0;
    }

    .page-slot canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--paper);
    }

    /* subtle inner shadow on page edges */
    .page-slot.left::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 20px;
      background: linear-gradient(to right, transparent, rgba(0, 0, 0, .07));
      pointer-events: none;
      z-index: 2;
    }

    .page-slot.right::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 20px;
      background: linear-gradient(to left, transparent, rgba(0, 0, 0, .05));
      pointer-events: none;
      z-index: 2;
    }

    .page-num {
      position: absolute;
      bottom: 10px;
      font-size: 11px;
      color: #8a7556;
      font-family: 'Playfair Display', serif;
      letter-spacing: .05em;
      z-index: 3;
    }

    .page-slot.left .page-num {
      left: 16px;
    }

    .page-slot.right .page-num {
      right: 16px;
    }

    /* ===== Flip animation ===== */
    .flip-page {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      transform-origin: left center;
      z-index: 10;
      background: var(--paper);
    }

    .flip-page.from-right {
      left: 50%;
      transform-origin: left center;
      box-shadow: -8px 0 30px rgba(0, 0, 0, .3);
    }

    .flip-page.from-left {
      left: 0;
      transform-origin: right center;
      box-shadow: 8px 0 30px rgba(0, 0, 0, .3);
    }

    .flip-page canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--paper);
      backface-visibility: hidden;
    }

    .flip-page .face-back {
      transform: rotateY(180deg);
    }

    .flip-page.animating {
      transition: transform .7s cubic-bezier(.4, .08, .2, 1);
    }

    /* Page curl shadow */
    .flip-page::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, transparent 80%, rgba(0, 0, 0, .2) 100%);
      pointer-events: none;
    }

    .flip-page.from-left::after {
      background: linear-gradient(90deg, rgba(0, 0, 0, .2) 0%, transparent 20%);
    }

    /* ===== Controls ===== */
    .controls {
      position: absolute;
      bottom: 14px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
    }

    .btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--brass-dim);
      background: linear-gradient(180deg, rgba(74, 50, 32, .9), rgba(43, 29, 20, .9));
      color: var(--brass-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: transform .15s, background .15s, opacity .2s, box-shadow .2s;
      user-select: none;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .3);
    }

    .btn:hover {
      background: linear-gradient(180deg, rgba(92, 65, 40, .95), rgba(60, 40, 26, .95));
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, .4);
    }

    .btn:active {
      transform: translateY(0) scale(.94);
    }

    .btn.disabled {
      opacity: .25;
      cursor: default;
      pointer-events: none;
    }

    .counter {
      color: #cdb98a;
      font-size: 12px;
      min-width: 80px;
      text-align: center;
      letter-spacing: .06em;
      font-variant-numeric: tabular-nums;
      font-family: 'Inter', sans-serif;
    }

    /* ===== Swipe zones ===== */
    .swipe-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 16%;
      z-index: 30;
      cursor: pointer;
    }

    .swipe-zone.left {
      left: 0;
    }

    .swipe-zone.right {
      right: 0;
    }

    /* ===== Loading ===== */
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--brass-light);
      font-size: 13px;
      letter-spacing: .06em;
      z-index: 50;
      background: transparent;
    }

    .ring {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(200, 155, 74, .2);
      border-top-color: var(--brass-light);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-box {
      max-width: 380px;
      text-align: center;
      color: #e8c9a0;
      font-size: 13px;
      line-height: 1.7;
      padding: 24px;
    }

    .error-box code {
      background: rgba(0, 0, 0, .35);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* ===== Zoom hint ===== */
    .zoom-hint {
      position: absolute;
      bottom: 66px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200, 155, 74, .45);
      font-size: 10.5px;
      letter-spacing: .05em;
      white-space: nowrap;
      pointer-events: none;
      animation: fadeHint 3s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeHint {
      0% {
        opacity: 1;
      }

      70% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    /* ===== Mobile ===== */
    @media (max-width: 720px) {
      :root {
        --sidebar-w: 160px;
      }

      .sidebar {
        display: none;
      }

      .book-wrap {
        width: 92vw;
        height: 75vh;
      }

      .page-slot.left {
        display: none;
      }

      .page-slot.right {
        width: 100%;
        border-radius: 4px;
      }

      .spine {
        display: none;
      }

      .flip-page {
        width: 100%;
      }

      .flip-page.from-right {
        left: 0;
      }

      .title-center {
        font-size: 12px;
      }

      .topbar {
        height: 44px;
      }

      .book-area {
        padding-top: 44px;
      }
    }

    @media (max-width: 480px) {
      .pill {
        display: none;
      }
    }

    /* Sidebar hidden state */
    .sidebar.hidden {
      width: 0;
      border-right: none;
    }

    /* Page flip enter animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          Cinnamon Forest
          <small>Catalogue sản phẩm</small>
        </div>
      </div>
      <div class="thumb-list" id="thumbList"></div>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Top bar -->
      <div class="topbar">
        <div class="toggle-sidebar" id="toggleSidebar" title="Mục lục trang">
          <svg viewBox="0 0 18 18">
            <line x1="2" y1="5" x2="16" y2="5" />
            <line x1="2" y1="9" x2="16" y2="9" />
            <line x1="2" y1="13" x2="16" y2="13" />
          </svg>
        </div>

        <div class="title-center" id="titleCenter">Catalogue sản phẩm</div>

        <div class="top-actions">
          <div class="pill" id="downloadBtn">⬇ Tải PDF</div>
        </div>
      </div>

      <!-- Book area -->
      <div class="book-area">
        <div class="book-wrap">
          <div class="book" id="book">
            <div class="book-shadow"></div>
            <div class="loading" id="loading">
              <div class="ring"></div>
              <div id="loadingText">Đang mở catalogue…</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls" id="controls" style="display:none;">
        <div class="btn disabled" id="prevBtn" aria-label="Trang trước">&#8249;</div>
        <div class="counter" id="counter">— / —</div>
        <div class="btn" id="nextBtn" aria-label="Trang sau">&#8250;</div>
      </div>

      <!-- Zoom hint -->
      <div class="zoom-hint" id="zoomHint" style="display:none;">Bấm hai bên sách hoặc dùng phím ← → để lật trang</div>

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>

    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    /* ======================================================
       CẤU HÌNH
    ====================================================== */
    const PDF_URL = "./catalogue.pdf";
    const CATALOGUE_TITLE = "Catalogue sản phẩm";

    /* ====================================================== */

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    document.getElementById('titleCenter').textContent = CATALOGUE_TITLE;
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = PDF_URL;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    const bookEl = document.getElementById('book');
    const loadingEl = document.getElementById('loading');
    const loadingTextEl = document.getElementById('loadingText');
    const controlsEl = document.getElementById('controls');
    const counterEl = document.getElementById('counter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const zoomHint = document.getElementById('zoomHint');
    const progressFill = document.getElementById('progressFill');
    const thumbList = document.getElementById('thumbList');
    const sidebar = document.getElementById('sidebar');

    let pdfDoc = null;
    let numPages = 0;
    let pageCanvasCache = new Map();
    let isMobile = window.matchMedia('(max-width: 720px)').matches;
    let currentLeft = 0;
    let isAnimating = false;
    let sidebarOpen = true;

    // Sidebar toggle
    document.getElementById('toggleSidebar').addEventListener('click', () => {
      sidebarOpen = !sidebarOpen;
      sidebar.classList.toggle('hidden', !sidebarOpen);
    });

    /* ===== Render page to canvas ===== */
    async function renderPageToCanvas(pageNum, targetCanvas) {
      const page = await pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 1 });
      const outputScale = Math.min(window.devicePixelRatio || 1, 2) * 2;
      targetCanvas.width = Math.floor(viewport.width * outputScale);
      targetCanvas.height = Math.floor(viewport.height * outputScale);
      const ctx = targetCanvas.getContext('2d');
      await page.render({
        canvasContext: ctx,
        viewport: page.getViewport({ scale: outputScale })
      }).promise;
      return { width: viewport.width, height: viewport.height };
    }

    async function getPageCanvas(pageNum) {
      if (pageNum < 1 || pageNum > numPages) return null;
      if (pageCanvasCache.has(pageNum)) return pageCanvasCache.get(pageNum);
      const canvas = document.createElement('canvas');
      await renderPageToCanvas(pageNum, canvas);
      const entry = { canvas };
      pageCanvasCache.set(pageNum, entry);
      return entry;
    }

    /* ===== Thumbnails ===== */
    const thumbElems = [];

    function buildThumbnails() {
      thumbList.innerHTML = '';
      for (let p = 1; p <= numPages; p++) {
        const item = document.createElement('div');
        item.className = 'thumb-item';
        item.innerHTML = `<div class="thumb-loading"><div class="mini-ring"></div></div><div class="thumb-num">${p}</div>`;
        item.dataset.page = p;
        item.addEventListener('click', () => jumpToPage(p));
        thumbList.appendChild(item);
        thumbElems.push(item);
        // Render thumb async
        renderThumb(p, item);
      }
    }

    async function renderThumb(pageNum, item) {
      const entry = await getPageCanvas(pageNum);
      if (!entry) return;
      const thumb = document.createElement('canvas');
      thumb.width = entry.canvas.width;
      thumb.height = entry.canvas.height;
      thumb.getContext('2d').drawImage(entry.canvas, 0, 0);
      const loading = item.querySelector('.thumb-loading');
      if (loading) loading.remove();
      item.insertBefore(thumb, item.querySelector('.thumb-num'));
    }

    function updateThumbActive() {
      const activePages = isMobile
        ? [currentLeft]
        : currentLeft <= 0 ? [1] : [currentLeft, currentLeft + 1];

      thumbElems.forEach((el, i) => {
        const p = i + 1;
        el.classList.toggle('active', activePages.includes(p));
      });

      // Scroll active thumb into view
      const firstActive = thumbElems[activePages[0] - 1];
      if (firstActive) firstActive.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function jumpToPage(pageNum) {
      if (isMobile) {
        currentLeft = pageNum;
      } else {
        if (pageNum === 1) {
          currentLeft = 0;
        } else if (pageNum % 2 === 0) {
          currentLeft = pageNum;
        } else {
          currentLeft = pageNum - 1;
        }
      }
      renderSpread();
    }

    /* ===== Progress ===== */
    function updateProgress() {
      const pct = numPages <= 1 ? 100 : ((currentLeft <= 0 ? 1 : currentLeft) / numPages) * 100;
      progressFill.style.width = Math.min(pct, 100) + '%';
    }

    /* ===== Build spread DOM ===== */
    function buildSpreadDOM() {
      bookEl.innerHTML = '';
      const shadow = document.createElement('div');
      shadow.className = 'book-shadow';
      bookEl.appendChild(shadow);

      const spread = document.createElement('div');
      spread.className = 'spread';
      spread.id = 'spread';

      const leftSlot = document.createElement('div');
      leftSlot.className = 'page-slot left';
      leftSlot.id = 'leftSlot';

      const rightSlot = document.createElement('div');
      rightSlot.className = 'page-slot right';
      rightSlot.id = 'rightSlot';

      const spine = document.createElement('div');
      spine.className = 'spine';

      spread.appendChild(leftSlot);
      spread.appendChild(spine);
      spread.appendChild(rightSlot);
      bookEl.appendChild(spread);

      const leftZone = document.createElement('div');
      leftZone.className = 'swipe-zone left';
      leftZone.addEventListener('click', goPrev);
      const rightZone = document.createElement('div');
      rightZone.className = 'swipe-zone right';
      rightZone.addEventListener('click', goNext);
      bookEl.appendChild(leftZone);
      bookEl.appendChild(rightZone);
    }

    async function placePageInSlot(slotEl, pageNum) {
      slotEl.innerHTML = '';
      if (pageNum < 1 || pageNum > numPages) return;
      const entry = await getPageCanvas(pageNum);
      if (!entry) return;
      const clone = document.createElement('canvas');
      clone.width = entry.canvas.width;
      clone.height = entry.canvas.height;
      clone.getContext('2d').drawImage(entry.canvas, 0, 0);
      slotEl.appendChild(clone);
      const num = document.createElement('div');
      num.className = 'page-num';
      num.textContent = pageNum;
      slotEl.appendChild(num);
    }

    async function renderSpread() {
      if (isMobile) {
        const rightSlot = document.getElementById('rightSlot');
        await placePageInSlot(rightSlot, currentLeft);
        document.getElementById('leftSlot').innerHTML = '';
      } else {
        const leftSlot = document.getElementById('leftSlot');
        const rightSlot = document.getElementById('rightSlot');
        if (currentLeft <= 0) {
          leftSlot.innerHTML = '';
          await placePageInSlot(rightSlot, 1);
        } else {
          await placePageInSlot(leftSlot, currentLeft);
          await placePageInSlot(rightSlot, currentLeft + 1);
        }
      }
      updateCounter();
      updateNavState();
      updateProgress();
      updateThumbActive();
    }

    function updateCounter() {
      if (isMobile) {
        counterEl.textContent = `${currentLeft} / ${numPages}`;
      } else {
        if (currentLeft <= 0) {
          counterEl.textContent = `1 / ${numPages}`;
        } else {
          const r = Math.min(currentLeft + 1, numPages);
          counterEl.textContent = `${currentLeft}–${r} / ${numPages}`;
        }
      }
    }

    function updateNavState() {
      if (isMobile) {
        prevBtn.classList.toggle('disabled', currentLeft <= 1);
        nextBtn.classList.toggle('disabled', currentLeft >= numPages);
      } else {
        prevBtn.classList.toggle('disabled', currentLeft <= 0);
        nextBtn.classList.toggle('disabled', currentLeft > 0 && currentLeft + 1 >= numPages);
      }
    }

    /* ===== Flip animation ===== */
    async function animateFlip(direction) {
      if (isAnimating) return;
      isAnimating = true;

      const spread = document.getElementById('spread');
      const flip = document.createElement('div');
      flip.className = 'flip-page ' + (direction === 'next' ? 'from-right' : 'from-left');

      let frontPageNum, backPageNum;
      if (isMobile) {
        frontPageNum = currentLeft;
        backPageNum = direction === 'next' ? currentLeft + 1 : currentLeft - 1;
      } else {
        if (direction === 'next') {
          frontPageNum = currentLeft <= 0 ? 1 : currentLeft + 1;
          backPageNum = currentLeft <= 0 ? 2 : currentLeft + 2;
        } else {
          frontPageNum = currentLeft <= 0 ? null : currentLeft;
          backPageNum = currentLeft <= 0 ? null : currentLeft - 1;
        }
      }

      const frontEntry = frontPageNum ? await getPageCanvas(frontPageNum) : null;
      const backEntry = backPageNum ? await getPageCanvas(backPageNum) : null;

      const frontCanvas = document.createElement('canvas');
      const backCanvas = document.createElement('canvas');
      if (frontEntry) {
        frontCanvas.width = frontEntry.canvas.width;
        frontCanvas.height = frontEntry.canvas.height;
        frontCanvas.getContext('2d').drawImage(frontEntry.canvas, 0, 0);
      }
      if (backEntry) {
        backCanvas.width = backEntry.canvas.width;
        backCanvas.height = backEntry.canvas.height;
        backCanvas.getContext('2d').drawImage(backEntry.canvas, 0, 0);
        backCanvas.classList.add('face-back');
      }
      flip.appendChild(frontCanvas);
      if (backEntry) flip.appendChild(backCanvas);
      spread.appendChild(flip);

      flip.style.transform = 'rotateY(0deg)';
      void flip.offsetWidth;
      flip.classList.add('animating');

      const targetRotation = direction === 'next' ? '-180deg' : '180deg';

      await new Promise(resolve => {
        requestAnimationFrame(() => {
          flip.style.transform = `rotateY(${targetRotation})`;
        });
        flip.addEventListener('transitionend', resolve, { once: true });
        setTimeout(resolve, 900);
      });

      flip.remove();
      isAnimating = false;
    }

    async function goNext() {
      if (isAnimating) return;
      if (isMobile) {
        if (currentLeft >= numPages) return;
        await animateFlip('next');
        currentLeft += 1;
      } else {
        if (currentLeft > 0 && currentLeft + 1 >= numPages) return;
        await animateFlip('next');
        currentLeft = currentLeft <= 0 ? 2 : currentLeft + 2;
      }
      renderSpread();
    }

    async function goPrev() {
      if (isAnimating) return;
      if (isMobile) {
        if (currentLeft <= 1) return;
        await animateFlip('prev');
        currentLeft -= 1;
      } else {
        if (currentLeft <= 0) return;
        await animateFlip('prev');
        currentLeft = currentLeft <= 2 ? 0 : currentLeft - 2;
      }
      renderSpread();
    }

    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') goNext();
      if (e.key === 'ArrowLeft') goPrev();
    });

    let touchStartX = null;
    bookEl.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    bookEl.addEventListener('touchend', (e) => {
      if (touchStartX === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) { dx < 0 ? goNext() : goPrev(); }
      touchStartX = null;
    }, { passive: true });

    window.addEventListener('resize', () => {
      const nowMobile = window.matchMedia('(max-width: 720px)').matches;
      if (nowMobile !== isMobile) {
        isMobile = nowMobile;
        currentLeft = isMobile ? 1 : 0;
        buildSpreadDOM();
        renderSpread();
      }
    });

    /* ===== Init ===== */
    async function init() {
      try {
        loadingTextEl.textContent = 'Đang mở catalogue…';
        pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
        numPages = pdfDoc.numPages;

        loadingTextEl.textContent = `Đang tải trang… (0/${numPages})`;
        await getPageCanvas(1);
        if (numPages > 1) await getPageCanvas(2);

        loadingEl.remove();
        buildSpreadDOM();
        buildThumbnails();
        currentLeft = isMobile ? 1 : 0;
        await renderSpread();
        controlsEl.style.display = 'flex';
        zoomHint.style.display = 'block';

        // Background preload remaining pages
        for (let p = 3; p <= numPages; p++) {
          getPageCanvas(p);
        }
      } catch (err) {
        console.error(err);
        loadingEl.innerHTML = `
        <div class="error-box">
          Không tải được file catalogue.<br><br>
          Kiểm tra lại đường dẫn <code>PDF_URL</code> trong file HTML —
          hiện đang trỏ tới: <code>${PDF_URL}</code><br><br>
          File PDF cần được đặt cùng thư mục hoặc dùng link HTTPS đầy đủ.
        </div>
      `;
      }
    }

    
/* ===== Enhanced Flip ===== */
const flipSound = new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=page-turn-110004.mp3');
flipSound.volume = 0.25;

function playFlipSound(){
  try{
    flipSound.currentTime = 0;
    flipSound.play();
  }catch(e){}
}

let dragStartX = 0;
let draggingMouse = false;

bookEl.addEventListener('pointerdown',(e)=>{
  dragStartX = e.clientX;
  draggingMouse = true;
});

bookEl.addEventListener('pointerup',(e)=>{
  if(!draggingMouse) return;
  const dx = e.clientX - dragStartX;

  if(dx < -80) goNext();
  if(dx > 80) goPrev();

  draggingMouse = false;
});

const oldGoNext = goNext;
goNext = async function(){
  playFlipSound();
  return oldGoNext();
}

const oldGoPrev = goPrev;
goPrev = async function(){
  playFlipSound();
  return oldGoPrev();
}


init();
  </script>
</body>
